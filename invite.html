<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Askia - Invitation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        .invite-gradient {
            background: linear-gradient(135deg, #6366f1 0%, #ec4899 100%);
        }
        .auth-input {
            background: white;
            border: 2px solid #e5e7eb;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }
        .auth-input:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
        .auth-button {
            background: linear-gradient(135deg, #6366f1 0%, #ec4899 100%);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .auth-button:hover {
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3);
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="index.html" class="flex items-center space-x-2 hover:opacity-80 transition-opacity">
                    <div class="w-8 h-8 bg-gradient-to-br from-indigo-600 to-pink-600 rounded-lg flex items-center justify-center text-white font-bold text-sm">A</div>
                    <span class="text-lg font-bold text-gray-900">Askia</span>
                </a>
                <a href="index.html" class="text-gray-600 hover:text-gray-900 font-medium">← Back Home</a>
            </div>
        </div>
    </nav>

    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="max-w-md w-full">
            <!-- Loading State -->
            <div id="loadingState" class="text-center">
                <div class="inline-block">
                    <div class="spinner mx-auto"></div>
                </div>
                <p class="text-gray-600 mt-4 font-medium">Validating your invitation...</p>
            </div>

            <!-- Error State -->
            <div id="errorState" class="hidden text-center">
                <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <span class="text-3xl">⚠️</span>
                </div>
                <h2 class="text-2xl font-bold text-gray-900 mb-2">Invalid Invitation</h2>
                <p id="errorMessage" class="text-gray-600 mb-6"></p>
                <a href="index.html" class="inline-block px-6 py-3 bg-gradient-to-r from-indigo-600 to-pink-600 text-white rounded-lg hover:shadow-lg transition-all">Return Home</a>
            </div>

            <!-- Register State -->
            <div id="registerState" class="hidden">
                <div class="text-center mb-8">
                    <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                        <span class="text-3xl">🎉</span>
                    </div>
                    <h1 class="text-3xl font-bold text-gray-900 mb-2">You're Invited!</h1>
                    <p id="tenantName" class="text-gray-600">Complete your registration to join the team</p>
                </div>

                <div id="registerError" class="hidden bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-lg mb-6 text-sm"></div>

                <form id="workerRegisterForm" class="space-y-4">
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
                        <input type="email" id="email" required class="auth-input w-full bg-white" placeholder="you@example.com">
                        <p id="emailHint" class="text-xs text-gray-500 mt-1">Enter the email address your manager invited.</p>
                    </div>

                    <div>
                        <label for="name" class="block text-sm font-medium text-gray-700 mb-2">Full Name</label>
                        <input type="text" id="name" required class="auth-input w-full" placeholder="John Doe">
                    </div>

                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Create Password</label>
                        <input type="password" id="password" required minlength="6" class="auth-input w-full" placeholder="••••••••">
                        <p class="text-xs text-gray-500 mt-1">At least 6 characters</p>
                    </div>

                    <button type="submit" class="auth-button w-full mt-6">
                        ✓ Join Marketplace
                    </button>
                </form>

                <div class="mt-6 text-center">
                    <p class="text-gray-600 text-sm">
                        Already have an account? 
                        <a href="auth.html?mode=login" class="text-indigo-600 hover:text-indigo-700 font-semibold">Sign in</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="database.js"></script>
    <script src="invite.js"></script>
</body>
</html>

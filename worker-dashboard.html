<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worker Dashboard - Askia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        .pos-header {
            background: linear-gradient(135deg, #6366f1 0%, #ec4899 100%);
        }
        .product-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(99, 102, 241, 0.15);
        }
        .product-card.selected {
            border: 3px solid #6366f1;
            box-shadow: 0 20px 40px rgba(99, 102, 241, 0.3);
        }
        .cart-item {
            animation: slideUp 0.3s ease;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Header -->
    <header class="pos-header text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center">
                        <span class="font-bold text-lg">🛒</span>
                    </div>
                    <div>
                        <h1 id="tenantName" class="text-xl font-bold">Loading...</h1>
                        <p class="text-white/70 text-xs">Point of Sale</p>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="text-right">
                        <p id="userName" class="font-medium">Loading...</p>
                        <p class="text-white/70 text-xs">Worker</p>
                    </div>
                    <button onclick="logout()" class="px-4 py-2 bg-white/20 hover:bg-white/30 rounded-lg font-medium transition-colors">Logout</button>
                </div>
            </div>
        </div>
    </header>

    <!-- Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Products Grid -->
            <div class="lg:col-span-2">
                <div class="mb-6">
                    <h2 class="text-3xl font-bold text-gray-900 mb-2">Products</h2>
                    <div class="flex gap-2">
                        <input type="text" id="searchProducts" placeholder="🔍 Search products..." class="flex-1 px-4 py-2 border-2 border-gray-300 rounded-lg focus:border-indigo-600 focus:outline-none">
                    </div>
                </div>
                <div id="productsGrid" class="grid grid-cols-2 md:grid-cols-3 gap-4">
                </div>
            </div>

            <!-- Cart -->
            <div class="lg:col-span-1">
                <div class="card p-6 sticky top-8">
                    <h2 class="text-xl font-bold text-gray-900 mb-4">🛒 Your Cart</h2>
                    
                    <div id="cartItems" class="space-y-2 mb-6 max-h-96 overflow-y-auto">
                        <p class="text-center text-gray-500 py-8">Cart is empty</p>
                    </div>

                    <div id="cartTotal" class="hidden">
                        <div class="border-t border-gray-200 pt-4 mb-4">
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-gray-600">Subtotal</span>
                                <span id="subtotalAmount" class="font-semibold">$0.00</span>
                            </div>
                            <div class="flex justify-between items-center mb-4">
                                <span class="text-gray-600">Tax</span>
                                <span id="taxAmount" class="font-semibold">$0.00</span>
                            </div>
                            <div class="flex justify-between items-center mb-6 pt-4 border-t-2 border-gray-200">
                                <span class="text-lg font-bold text-gray-900">Total</span>
                                <span id="totalAmount" class="text-2xl font-bold text-indigo-600">$0.00</span>
                            </div>
                        </div>

                        <div class="space-y-2 mb-4">
                            <button onclick="checkout('cash')" class="w-full py-3 bg-gradient-to-r from-green-600 to-green-700 text-white rounded-lg hover:shadow-lg transition-all font-semibold flex items-center justify-center gap-2">
                                💵 Cash Payment
                            </button>
                            <button onclick="checkout('card')" class="w-full py-3 bg-gradient-to-r from-blue-600 to-blue-700 text-white rounded-lg hover:shadow-lg transition-all font-semibold flex items-center justify-center gap-2">
                                💳 Card Payment
                            </button>
                            <button onclick="checkout('other')" class="w-full py-3 bg-gradient-to-r from-purple-600 to-purple-700 text-white rounded-lg hover:shadow-lg transition-all font-semibold flex items-center justify-center gap-2">
                                ➕ Other Payment
                            </button>
                            <button onclick="clearCart()" class="w-full py-3 bg-red-100 text-red-600 hover:bg-red-200 rounded-lg transition-colors font-semibold">
                                🗑️ Clear Cart
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="database.js"></script>
    <script src="worker-dashboard.js"></script>
</body>
</html>
